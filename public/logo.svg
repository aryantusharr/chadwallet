  <!-- Head outline -->
  <path d="M100 20 C55 20, 30 55, 30 90 C30 110, 35 125, 45 135 L40 155 C38 162, 38 170, 45 175 L55 180 C60 182, 65 180, 68 177 L75 168 C82 172, 90 174, 100 174 C110 174, 118 172, 125 168 L132 177 C135 180, 140 182, 145 180 L155 175 C162 170, 162 162, 160 155 L155 135 C165 125, 170 110, 170 90 C170 55, 145 20, 100 20Z" 
